# .github/workflows/secret-rotation-reminder.yml
# P2-8: Automated Secret Rotation Reminders

name: Secret Rotation Reminder

on:
  schedule:
    # Run at 9 AM UTC on the 1st of every 3rd month (Jan, Apr, Jul, Oct)
    - cron: '0 9 1 */3 *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  create-rotation-reminder:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Create rotation reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const secrets = [
              {
                name: 'Neo4j Database Password',
                location: '.env.vps (VPS), GitHub Secrets',
                rotation_steps: [
                  'Generate new strong password (24+ chars)',
                  'Update Neo4j: `neo4j-admin set-initial-password <new-password>`',
                  'Update .env.vps on VPS',
                  'Update GitHub Secret: NEO4J_PASSWORD',
                  'Deploy application with new password',
                  'Verify database connectivity',
                  'Document rotation in 1Password/Vault'
                ]
              },
              {
                name: 'Redis Password',
                location: '.env.vps (VPS), redis.conf',
                rotation_steps: [
                  'Generate new password',
                  'Update redis.conf: `requirepass <new-password>`',
                  'Restart Redis: `docker compose restart redis`',
                  'Update .env.vps: REDIS_PASSWORD',
                  'Deploy application',
                  'Verify Redis connectivity'
                ]
              },
              {
                name: 'GitHub Actions Secrets',
                location: 'Repository Settings → Secrets',
                secrets_list: [
                  'GITGUARDIAN_API_KEY',
                  'SONAR_TOKEN',
                  'DOCKERHUB_TOKEN',
                  'VPS_SSH_PRIVATE_KEY'
                ],
                rotation_steps: [
                  'Generate new tokens in respective services',
                  'Update in GitHub Settings → Secrets and variables → Actions',
                  'Test by triggering CI workflow',
                  'Revoke old tokens after verification'
                ]
              },
              {
                name: 'VPS SSH Keys',
                location: '~/.ssh/authorized_keys on VPS',
                rotation_steps: [
                  'Generate new SSH key pair: `ssh-keygen -t ed25519`',
                  'Add new public key to VPS authorized_keys',
                  'Update GitHub Secret: VPS_SSH_PRIVATE_KEY',
                  'Test deployment with new key',
                  'Remove old public key from authorized_keys'
                ]
              },
              {
                name: 'API Keys (External Services)',
                location: '.env.vps, GitHub Secrets',
                rotation_steps: [
                  'Identify all external API keys (OpenAI, Anthropic, etc.)',
                  'Generate new keys in service dashboards',
                  'Update .env.vps and GitHub Secrets',
                  'Deploy with new keys',
                  'Verify service connectivity',
                  'Revoke old keys'
                ]
              }
            ];

            const checklistItems = secrets.map(secret => {
              let item = `- [ ] **${secret.name}**\n`;
              item += `  - Location: \`${secret.location}\`\n`;

              if (secret.secrets_list) {
                item += `  - Secrets: ${secret.secrets_list.map(s => \`\`\${s}\`\`).join(', ')}\n`;
              }

              item += `  - Steps:\n`;
              secret.rotation_steps.forEach((step, idx) => {
                item += `    ${idx + 1}. ${step}\n`;
              });

              return item;
            }).join('\n');

            const issueBody = `## 🔄 Quarterly Secret Rotation

            It's time for our quarterly security credential rotation! This ensures compromised secrets have limited lifetime.

            **Due Date:** Within 2 weeks (${new Date(Date.now() + 14 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]})

            ## Secrets to Rotate

            ${checklistItems}

            ## Post-Rotation Checklist

            - [ ] All secrets rotated successfully
            - [ ] Application health verified after rotation
            - [ ] Old secrets revoked/deleted
            - [ ] Rotation documented in password manager
            - [ ] Team notified of completion

            ## Resources

            - [Secret Rotation Runbook](https://wiki.company.com/runbooks/secret-rotation)
            - [Password Manager](https://1password.com)
            - [GitHub Secrets](https://github.com/:owner/:repo/settings/secrets/actions)

            ## Need Help?

            Reach out in #security channel or tag @security-team.
            `;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: \`[SECURITY] Quarterly Secret Rotation - \${new Date().toISOString().split('T')[0]}\`,
              body: issueBody,
              labels: ['security', 'maintenance', 'high-priority'],
              assignees: ['MAINTAINER_GITHUB_USERNAME']  // Replace with actual username
            });

            console.log(\`Created rotation reminder issue #\${issue.data.number}\`);

            // Optional: Send Slack notification
            // await fetch(process.env.SLACK_WEBHOOK_URL, {
            //   method: 'POST',
            //   body: JSON.stringify({
            //     text: \`🔒 Quarterly secret rotation reminder created: \${issue.data.html_url}\`
            //   })
            // });
