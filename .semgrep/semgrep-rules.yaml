# =============================================================================
# Python CI Policy Rules — Regression Prevention (Repo-Agnostic)
#
# Semgrep rules that enforce Python best practices. Drop this file into any
# Python project's .semgrep/ directory and run:
#
#   semgrep --config .semgrep/semgrep-rules.yaml .
#
# Customize paths.include/exclude to match YOUR project structure.
# All rules are universal Python — nothing project-specific.
#
# To customize:
#   1. Change paths.include to match your source directories
#   2. Add project-specific rules at the bottom
#   3. Change severity levels as needed (ERROR = blocks CI, WARNING = report only)
# =============================================================================

rules:

# ---------------------------------------------------------------------------
# RULE 1: No deprecated datetime.utcnow()
# Rationale: Deprecated in Python 3.12, returns naive datetime
# ---------------------------------------------------------------------------
- id: no-datetime-utcnow
  pattern: datetime.utcnow()
  message: |
    datetime.utcnow() is deprecated in Python 3.12+. Use datetime.now(UTC) instead.

    Fix:
      from datetime import UTC, datetime
      timestamp = datetime.now(UTC)
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "scripts/**"
      - "venv/**"
      - ".venv/**"

# ---------------------------------------------------------------------------
# RULE 2: httpx.AsyncClient must use async context manager
# Rationale: Without context manager, client connections are leaked
# ---------------------------------------------------------------------------
- id: httpx-async-context-required
  patterns:
    - pattern: $CLIENT = httpx.AsyncClient(...)
    - pattern-not-inside: |
        async with httpx.AsyncClient(...) as $CLIENT:
            ...
  message: |
    httpx.AsyncClient() must use async context manager for proper cleanup.

    Bad:
      client = httpx.AsyncClient()
      await client.aclose()  # Easy to forget!

    Good:
      async with httpx.AsyncClient() as client:
          ...  # Auto-closed on exit
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 3: Singleton pattern must use lock for thread safety
# Rationale: Race condition when multiple threads init singleton
# ---------------------------------------------------------------------------
- id: singleton-requires-lock
  patterns:
    - pattern: |
        if $_INSTANCE is None:
            $_INSTANCE = $FACTORY(...)
    - pattern-not-inside: |
        with $_LOCK:
            ...
  message: |
    Singleton initialization must use a lock for thread safety.

    Bad:
      if _instance is None:
          _instance = create_instance()

    Good:
      if _instance is None:
          with _lock:
              if _instance is None:  # Double-check
                  _instance = create_instance()
  languages: [python]
  severity: WARNING
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 4: float() conversion should handle ValueError
# Rationale: float() raises ValueError on invalid input
# ---------------------------------------------------------------------------
- id: float-requires-try-except
  patterns:
    - pattern: float($VAR)
    - pattern-not-inside: |
        try:
            ...
        except ...:
            ...
  message: |
    float() conversion should handle ValueError for invalid input.

    Bad:
      value = float(user_input)  # Crashes on "abc"

    Good:
      try:
          value = float(user_input)
      except (ValueError, TypeError):
          value = default_value
  languages: [python]
  severity: WARNING
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 5: No eval() — Security vulnerability
# Rationale: eval() allows arbitrary code execution
# ---------------------------------------------------------------------------
- id: no-eval
  patterns:
    - pattern: eval(...)
    - pattern-not: $OBJ.eval(...)  # Allow tensor.eval(), model.eval()
  message: |
    eval() is forbidden — security vulnerability.

    Use safe alternatives:
      - json.loads() for JSON
      - ast.literal_eval() for Python literals
      - Custom parser for DSL
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "scripts/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 6: SQL queries must use parameterized queries
# Rationale: f-string SQL is vulnerable to injection
# ---------------------------------------------------------------------------
- id: no-sql-fstring
  patterns:
    - pattern-either:
        - pattern: f"SELECT ... {$VAR} ..."
        - pattern: f"INSERT ... {$VAR} ..."
        - pattern: f"UPDATE ... {$VAR} ..."
        - pattern: f"DELETE ... {$VAR} ..."
  message: |
    SQL queries must use parameterized queries, not f-strings.

    Bad:
      query = f"SELECT * FROM users WHERE id = '{user_id}'"

    Good:
      query = "SELECT * FROM users WHERE id = $1"
      await conn.fetch(query, user_id)
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 7: No pickle for deserialization — Security
# Rationale: pickle.loads() can execute arbitrary code
# ---------------------------------------------------------------------------
- id: no-pickle-loads
  pattern: pickle.loads(...)
  message: |
    pickle.loads() is forbidden — deserialization vulnerability.

    Use safe alternatives:
      - json.loads() for JSON data
      - msgpack for binary data
      - Protocol Buffers for structured data
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"

# ---------------------------------------------------------------------------
# RULE 8: No logger.getChild() with structlog
# Rationale: structlog doesn't have getChild() — use bind() instead
# Note: Only relevant if your project uses structlog. Remove if not.
# ---------------------------------------------------------------------------
- id: no-structlog-getchild
  pattern: $LOGGER.getChild(...)
  message: |
    structlog doesn't support getChild(). Use bind() instead.

    Bad:
      self.logger = logger.getChild(self.__class__.__name__)

    Good:
      self.logger = logger.bind(component=self.__class__.__name__)
  languages: [python]
  severity: ERROR
  paths:
    include:
      - "**/*.py"
    exclude:
      - "tests/**"
      - "venv/**"
