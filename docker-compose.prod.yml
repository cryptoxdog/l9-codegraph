services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: ${APP_NAME}-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}-redis
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
