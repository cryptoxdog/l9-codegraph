# Prometheus Configuration
# Scrapes metrics from OpenTelemetry Collector

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'graph-engine'
    environment: 'development'

scrape_configs:
  # Scrape OpenTelemetry Collector's own metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Scrape application metrics via OTel Collector
  - job_name: 'graph-engine'
    static_configs:
      - targets: ['otel-collector:8889']
