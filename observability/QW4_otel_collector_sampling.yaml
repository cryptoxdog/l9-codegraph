# ============================================================
# QW-4: OpenTelemetry Collector — Tail-Based Sampling
# Save as: monitoring/otel/otel-collector-config.yaml
# Impact: Observability costs -60-80% while keeping all errors
#
# Strategy:
#   1. ALWAYS keep traces with errors (100%)
#   2. ALWAYS keep traces > 2s latency (100%)
#   3. Sample 10% of normal/healthy traces
#   4. Rate-limit to 100 traces/sec max
#
# Result: You see every failure and slow request,
#         plus a representative 10% sample of healthy traffic.
# ============================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:

  # ── Tail-based sampling ────────────────────────────────────
  tail_sampling:
    # How long to wait for a trace to complete before deciding
    decision_wait: 10s
    # Max traces held in memory while waiting
    num_traces: 50000
    expected_new_traces_per_sec: 200

    policies:
      # Policy 1: Keep ALL error traces
      - name: errors-always
        type: status_code
        status_code:
          status_codes:
            - ERROR

      # Policy 2: Keep ALL slow traces (> 2 seconds)
      - name: slow-traces
        type: latency
        latency:
          threshold_ms: 2000

      # Policy 3: Keep ALL traces with specific attributes
      - name: important-operations
        type: string_attribute
        string_attribute:
          key: http.route
          values:
            - /v1/query           # Always trace query endpoint
            - /v1/admin/*         # Always trace admin ops

      # Policy 4: Sample 10% of remaining healthy traces
      - name: probabilistic-sample
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

      # Policy 5: Rate limit as safety valve
      - name: rate-limit
        type: rate_limiting
        rate_limiting:
          spans_per_second: 100

  # ── Batch for efficient export ─────────────────────────────
  batch:
    send_batch_size: 512
    timeout: 5s
    send_batch_max_size: 1024

  # ── Memory limiter (prevent OOM) ───────────────────────────
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # ── Resource detection ─────────────────────────────────────
  resource:
    attributes:
      - key: service.name
        value: graph-engine
        action: upsert
      - key: deployment.environment
        from_attribute: ENVIRONMENT
        action: upsert

exporters:
  # ── Jaeger (or Tempo) ──────────────────────────────────────
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # ── Debug logging (dev only) ───────────────────────────────
  debug:
    verbosity: basic

  # ── Prometheus (for span metrics) ──────────────────────────
  prometheus:
    endpoint: 0.0.0.0:8889
    metric_expiration: 5m

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch, resource]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
