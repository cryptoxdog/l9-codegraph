# OpenTelemetry Collector + Jaeger + Prometheus + Grafana
# Add this to your existing docker-compose.yml or create docker-compose.observability.yml

services:
  # OpenTelemetry Collector - receives traces/metrics from app
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: l9-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics (collector's own metrics)
    networks:
      - app-network

  # Jaeger - distributed tracing UI
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: l9-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC receiver
    networks:
      - app-network

  # Prometheus - metrics storage
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: l9-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app-network

  # Grafana - visualization dashboards
  grafana:
    image: grafana/grafana:10.3.3
    container_name: l9-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - prometheus
      - jaeger

volumes:
  prometheus-data:
  grafana-data:

networks:
  app-network:
    external: true
