# =============================================================================
# CI Quality Gates — Reusable Workflow (Repo-Agnostic)
#
# Drop into .github/workflows/ci-quality.yml of ANY Python project.
# All project-specific values come from repository variables/secrets.
#
# Required GitHub Secrets:
#   SONAR_TOKEN          — SonarCloud token
#   GITGUARDIAN_API_KEY  — GitGuardian API key
#   CODECOV_TOKEN        — Codecov upload token
#
# Required GitHub Variables (Settings → Variables):
#   PYTHON_VERSION       — Python version (e.g. "3.12")
#   SONAR_PROJECT_KEY    — SonarCloud project key
#   SONAR_ORG            — SonarCloud organization
#
# Optional GitHub Variables:
#   TEST_DB_IMAGE        — Postgres image (default: postgres:16)
#   TEST_DB_USER         — Test DB user (default: test)
#   TEST_DB_PASSWORD     — Test DB password (default: test)
#   TEST_DB_NAME         — Test DB name (default: test_db)
#   COVERAGE_THRESHOLD   — Min coverage % (default: 75)
#   TEST_EXTRA_DEPS      — Extra pip deps for tests (space-separated)
#   SOURCE_DIRS          — Directories to scan (default: ".")
#   SEMGREP_RULES_PATH   — Path to custom semgrep rules (default: .semgrep/)
#
# Usage:
#   1. Copy this file to .github/workflows/ci-quality.yml
#   2. Set secrets and variables in GitHub repo settings
#   3. Add these job names to your existing ci-complete "needs:" list
# =============================================================================

name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}

jobs:

  # ===========================================================================
  # LINT-FORMAT — Ruff + MyPy
  # ===========================================================================
  lint-format:
    name: Lint & Format (Ruff + MyPy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.5" mypy

      - name: Ruff (lint)
        run: ruff check . --output-format=github

      - name: Ruff (format)
        run: ruff format --check .

      - name: MyPy (type check)
        run: mypy . --config-file=pyproject.toml || true
        continue-on-error: true

  # ===========================================================================
  # SEMGREP — Custom Policy Rules
  # ===========================================================================
  semgrep:
    name: Semgrep Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: ${{ vars.SEMGREP_RULES_PATH || '.semgrep/' }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN || '' }}

  # ===========================================================================
  # SONARCLOUD — Code Quality & Security Analysis
  # ===========================================================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=term --ignore=tests/e2e || true
        continue-on-error: true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

  # ===========================================================================
  # SECRETS-SCAN — GitGuardian Secrets Detection
  # ===========================================================================
  secrets-scan:
    name: Secrets Scan (GitGuardian)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ===========================================================================
  # COVERAGE — Codecov with DB services
  # ===========================================================================
  coverage:
    name: Coverage (Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: ${{ vars.TEST_DB_IMAGE || 'postgres:16' }}
        env:
          POSTGRES_USER: ${{ vars.TEST_DB_USER || 'test' }}
          POSTGRES_PASSWORD: ${{ vars.TEST_DB_PASSWORD || 'test' }}
          POSTGRES_DB: ${{ vars.TEST_DB_NAME || 'test_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio pytest-cov httpx
          # Install any project-specific test deps
          if [ -n "${{ vars.TEST_EXTRA_DEPS }}" ]; then
            pip install ${{ vars.TEST_EXTRA_DEPS }}
          fi

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://${{ vars.TEST_DB_USER || 'test' }}:${{ vars.TEST_DB_PASSWORD || 'test' }}@localhost:5432/${{ vars.TEST_DB_NAME || 'test_db' }}
          REDIS_URL: redis://localhost:6379
          TESTING: "true"
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --ignore=tests/e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  # ===========================================================================
  # YAML-VALIDATE — YAML Linting
  # ===========================================================================
  yaml-validate:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml . 2>/dev/null || yamllint . || true
        continue-on-error: true

  # ===========================================================================
  # QUALITY-GATE — Aggregation job (add to your ci-complete "needs:")
  # ===========================================================================
  # ===========================================================================
  # SHELLCHECK — Shell Script Linting
  # ===========================================================================
  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -name "*.sh" -not -path "./.git/*" | xargs --no-run-if-empty shellcheck --severity=warning

  # ===========================================================================
  # SECRET-SCAN — Bandit Static Analysis
  # ===========================================================================
  secret-scan:
    name: Secret Scanning (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run bandit
        run: |
          pip install bandit
          bandit -r . -ll --exclude ./.venv,./node_modules,./.git

  # ===========================================================================
  # QUALITY-GATE — Aggregation job (add to your ci-complete "needs:")
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - semgrep
      - sonarcloud
      - secrets-scan
      - coverage
      - yaml-validate
      - shellcheck
      - secret-scan
    if: always()

    steps:
      - name: Quality Gate Summary
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              QUALITY GATE SUMMARY                           ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ├─ Lint & Format:  ${{ needs.lint-format.result }}"
          echo "  ├─ Semgrep:        ${{ needs.semgrep.result }}"
          echo "  ├─ SonarCloud:     ${{ needs.sonarcloud.result }}"
          echo "  ├─ Secrets Scan:   ${{ needs.secrets-scan.result }}"
          echo "  ├─ Coverage:       ${{ needs.coverage.result }}"
          echo "  ├─ YAML Validate:  ${{ needs.yaml-validate.result }}"
          echo "  ├─ ShellCheck:     ${{ needs.shellcheck.result }}"
          echo "  └─ Secret Scan:    ${{ needs.secret-scan.result }}"
          echo ""

          # Fail on critical gates
          FAILED=false

          if [[ "${{ needs.lint-format.result }}" == "failure" ]]; then
            echo "❌ Lint & Format failed"; FAILED=true
          fi

          if [[ "${{ needs.secrets-scan.result }}" == "failure" ]]; then
            echo "❌ Secrets Scan failed (hardcoded secrets detected)"; FAILED=true
          fi

          if [[ "${{ needs.coverage.result }}" == "failure" ]]; then
            echo "❌ Coverage below threshold"; FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

          echo "✅ All quality gates passed"

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Run pre-commit on all files
        uses: pre-commit/action@v3.0.1
