version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    groups:
      dev-tools:
        patterns: ["ruff", "mypy", "pytest*", "bandit", "semgrep"]
      core-deps:
        patterns: ["httpx", "fastapi", "pydantic*", "structlog"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
