name: SBOM Generation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install SBOM generator
        run: |
          pip install cyclonedx-bom poetry

      - name: Generate SBOM from Poetry
        run: |
          cyclonedx-py poetry --output-format json --output sbom.json
          cyclonedx-py poetry --output-format xml --output sbom.xml

      - name: Validate SBOM
        run: |
          # Check SBOM contains required fields
          python -c "
          import json
          with open('sbom.json') as f:
              sbom = json.load(f)
          assert 'metadata' in sbom, 'SBOM missing metadata'
          assert 'components' in sbom, 'SBOM missing components'
          assert len(sbom['components']) > 0, 'SBOM has no components'
          print(f'SBOM valid: {len(sbom[\"components\"])} components')
          "

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.json
            sbom.xml
          retention-days: 90

      - name: Publish SBOM to release (on release only)
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./sbom.json
          asset_name: sbom-${{ github.event.release.tag_name }}.json
          asset_content_type: application/json
